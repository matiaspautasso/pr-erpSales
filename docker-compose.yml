services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polleria
      POSTGRES_PASSWORD: polleria_dev
      POSTGRES_DB: polleria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polleria -d polleria_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
